spring:
  datasource:
    url: ${SWAPIT_DB_URL:jdbc:postgresql://swapit-postgres.cpc2mimscig9.ap-northeast-2.rds.amazonaws.com:5432/swapit?sslmode=require}
    driver-class-name: org.postgresql.Driver
    username: ${SWAPIT_DB_USERNAME:swapit_user}
    password: ${SWAPIT_DB_PASSWORD:wYJRuqD4A7KmC:d}
  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

management:
  health:
    db:
      enabled: true

server:
  port: ${SERVER_PORT:8080}

kakao:
  mobility:
    rest-api-key: ${KAKAO_REST_API_KEY:}

swapit:
  crew-settlement:
    currency: INR
    base-fee: 120
    distance-unit-meters: 1000
    fee-per-distance-unit: 25
    minimum-distance-fee: 25
    maximum-distance-fee: 120
    fallback-distance-meters: 1000
    scheduled-call-incentive: 0
    instant-call-incentive: 30
    completion-incentive: 25
    penalty-per-count: 30
    minimum-total: 120
    appliance-size-surcharges:
      small: 0
      medium: 15
      large: 35
    appliance-type-surcharges:
      microwave: 0
      air_purifier: 10
      washing_machine: 20
      refrigerator: 30
      air_conditioner: 25
      tv: 20
